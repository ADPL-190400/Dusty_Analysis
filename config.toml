# ═══════════════════════════════════════════════════════════════════════════════
#  config.toml  —  Dust Inspector  //  All runtime parameters
#  Chỉnh file này để thay đổi cài đặt mà không cần sửa source code.
# ═══════════════════════════════════════════════════════════════════════════════


# ── Camera backend ─────────────────────────────────────────────────────────────
[camera]

# "gige"   → GigE Vision camera (Aravis)
# "opencv" → USB / webcam (OpenCV VideoCapture)
backend = "gige"

# GigE — chỉ dùng khi backend = "gige"
# gige_camera_id:
#   ""            → tự động chọn camera đầu tiên tìm thấy
#   "DEV_xxxxxx"  → Device ID (xem: arv-tool-0.8 --list-devices)
#   "192.168.x.x" → IP trực tiếp của camera
gige_camera_id   = ""           # "" = auto
gige_pixel_format = "BayerRG8"  # Mono8 | Mono16 | BayerRG8 | BayerGB8 | BayerGR8 | BayerBG8 | RGB8Packed | BGR8Packed
gige_timeout_ms  = 3000         # timeout chờ frame từ stream (ms)
gige_packet_size = 0            # 0 = auto-negotiate; 1500 = MTU chuẩn (non-jumbo)

# GigE sensor crop — vùng cảm biến cần đọc (ROI phần cứng)
# Đặt về 0 để dùng toàn bộ sensor
sensor_target_height = 1300     # px — chiều cao vùng crop
sensor_full_height   = 2448     # px — chiều cao cảm biến thực tế
sensor_full_width    = 2048     # px — chiều rộng cảm biến thực tế

# OpenCV — chỉ dùng khi backend = "opencv"
opencv_camera_index  = 0

# FPS mục tiêu (cả GigE lẫn OpenCV)
target_fps = 30


# ── Exposure ───────────────────────────────────────────────────────────────────
[exposure]

# "auto"   → camera tự điều chỉnh
# "manual" → dùng giá trị exposure_time_us bên dưới
mode = "manual"

# Thời gian phơi sáng (micro-giây) — chỉ có hiệu lực khi mode = "manual"
#   Môi trường sáng (đèn LED/ring light) :     500 –   5_000 µs
#   Môi trường phòng bình thường         :   5_000 –  30_000 µs
#   Môi trường tối / tốc độ chậm        :  30_000 – 100_000 µs
exposure_time_us = 20000.0


# ── CV / Dust-detection parameters ────────────────────────────────────────────
[cv]

# Ngưỡng diff pixel grayscale [15–60]
# Thấp → nhạy hơn (bắt được bụi nhỏ, dễ báo nhầm)
# Cao  → kém nhạy (bỏ qua bụi nhỏ, ít báo nhầm)
diff_threshold = 20

# Kernel morphological OPEN — xóa noise nhỏ [1–7] (số lẻ)
morph_open_kernel = 3

# Kernel morphological CLOSE — nối mảnh vỡ [1–11] (số lẻ)
morph_close_kernel = 5

# Diện tích tối thiểu của 1 hạt bụi (px²) [3–50]
# Hạt nhỏ hơn ngưỡng này bị bỏ qua
min_dust_area_px = 8

# Có dùng CLAHE để tăng tương phản trước khi diff không?
use_clahe = true

# clipLimit CLAHE [1.0–4.0]
clahe_clip = 2.0

# tileGridSize CLAHE (width, height)
clahe_grid_w = 8
clahe_grid_h = 8

# Kích thước kernel Gaussian blur trước diff [1, 3, 5, 7] (1 = tắt)
gaussian_blur_ksize = 3

# Ngưỡng mật độ bụi để phân loại trạng thái (%)
#   density < threshold_light              → CLEAN
#   threshold_light  ≤ density < threshold_moderate → LIGHT DUST
#   threshold_moderate ≤ density < threshold_heavy   → MODERATE
#   density ≥ threshold_heavy             → HEAVY DUST
threshold_clean    = 1.0
threshold_light    = 5.0
threshold_moderate = 15.0


# ── YOLO export ───────────────────────────────────────────────────────────────
[yolo]

# Tỉ lệ chia train / val [0.0–1.0]
train_ratio = 0.8

# Padding xung quanh crop từng hạt bụi (px)
crop_padding = 6

# Danh sách tên class (thứ tự = class_id)
class_names = [
    "dust_fine",
    "dust_medium",
    "dust_coarse",
    "fiber",
    "contaminant",
]

# Ngưỡng auto-label theo cạnh dài nhất của bounding box (px)
#   max(w, h) < fine_max_px                  → class 0 dust_fine
#   fine_max_px ≤ max(w, h) < coarse_min_px  → class 1 dust_medium
#   max(w, h) ≥ coarse_min_px                → class 2 dust_coarse
fine_max_px   = 20
coarse_min_px = 60

# Kích thước bounding box tối thiểu để đưa vào label YOLO (px)
# Hạt nhỏ hơn sẽ bị bỏ qua khi export
min_box_px = 20

# Thư mục output mặc định khi export
default_output_dir = "yolo_dataset"


# ── Paths ──────────────────────────────────────────────────────────────────────
[paths]

# Đường dẫn file database SQLite
db_path = "data/inspection_history.db"

# Thư mục lưu ảnh chụp từng lần scan
image_dir = "data/captures"
